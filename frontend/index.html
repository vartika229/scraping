<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Maps Scraper</title>
    <meta name="description"
        content="Extract business data from Google Maps. Paste a URL, scrape, and download results as CSV, JSON, or Excel.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ── Reset & Base ─────────────────────────────────── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            font-size: 16px;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #0a0e1a;
            color: #e2e8f0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Animated BG ──────────────────────────────────── */
        .bg-gradient {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 10%, rgba(99, 102, 241, .18) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 80%, rgba(14, 165, 233, .12) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 50% 50%, rgba(168, 85, 247, .08) 0%, transparent 60%),
                #0a0e1a;
        }

        /* ── Layout ───────────────────────────────────────── */
        .wrapper {
            position: relative;
            z-index: 1;
            max-width: 960px;
            margin: 0 auto;
            padding: 2rem 1.25rem 4rem;
        }

        /* ── Hero ─────────────────────────────────────────── */
        .hero {
            text-align: center;
            padding: 3rem 0 2.5rem;
        }

        .hero-badge {
            display: inline-block;
            padding: .35rem 1rem;
            border-radius: 999px;
            background: rgba(99, 102, 241, .15);
            border: 1px solid rgba(99, 102, 241, .3);
            font-size: .75rem;
            font-weight: 600;
            letter-spacing: .06em;
            text-transform: uppercase;
            color: #818cf8;
            margin-bottom: 1.25rem;
        }

        .hero h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 800;
            line-height: 1.15;
            background: linear-gradient(135deg, #e0e7ff 0%, #818cf8 50%, #38bdf8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            margin-top: .75rem;
            font-size: 1.05rem;
            color: #94a3b8;
            max-width: 560px;
            margin-inline: auto;
        }

        /* ── Glass Card ───────────────────────────────────── */
        .card {
            background: rgba(15, 23, 42, .55);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(99, 102, 241, .15);
            border-radius: 1.25rem;
            padding: 2rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, .35);
            transition: border-color .3s;
        }

        .card:hover {
            border-color: rgba(99, 102, 241, .3);
        }

        /* ── Form Elements ────────────────────────────────── */
        label {
            display: block;
            font-size: .8rem;
            font-weight: 600;
            color: #94a3b8;
            margin-bottom: .4rem;
            text-transform: uppercase;
            letter-spacing: .05em;
        }

        .input-group {
            margin-bottom: 1.25rem;
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: .7rem 1rem;
            border-radius: .625rem;
            border: 1px solid rgba(148, 163, 184, .2);
            background: rgba(15, 23, 42, .6);
            color: #e2e8f0;
            font-size: .95rem;
            font-family: inherit;
            transition: border-color .25s, box-shadow .25s;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #818cf8;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, .2);
        }

        input::placeholder {
            color: #475569;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1rem;
        }

        @media (max-width: 600px) {
            .row {
                grid-template-columns: 1fr;
            }
        }

        /* Toggle switch */
        .toggle-row {
            display: flex;
            align-items: center;
            gap: .75rem;
            margin-bottom: 1.25rem;
        }

        .toggle-row label {
            margin: 0;
            cursor: pointer;
        }

        .switch {
            position: relative;
            width: 44px;
            height: 24px;
            flex-shrink: 0;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .switch .slider {
            position: absolute;
            inset: 0;
            border-radius: 999px;
            cursor: pointer;
            background: rgba(148, 163, 184, .25);
            transition: background .3s;
        }

        .switch .slider::before {
            content: '';
            position: absolute;
            left: 3px;
            top: 3px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #e2e8f0;
            transition: transform .3s;
        }

        .switch input:checked+.slider {
            background: #818cf8;
        }

        .switch input:checked+.slider::before {
            transform: translateX(20px);
        }

        /* ── Buttons ──────────────────────────────────────── */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: .5rem;
            padding: .75rem 1.75rem;
            border-radius: .625rem;
            font-size: .95rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            font-family: inherit;
            transition: all .25s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #818cf8);
            color: #fff;
            box-shadow: 0 4px 14px rgba(99, 102, 241, .35);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, .45);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: .5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: rgba(148, 163, 184, .12);
            color: #e2e8f0;
            border: 1px solid rgba(148, 163, 184, .2);
        }

        .btn-secondary:hover {
            background: rgba(148, 163, 184, .2);
        }

        .btn-group {
            display: flex;
            gap: .75rem;
            flex-wrap: wrap;
            margin-top: .5rem;
        }

        /* ── Spinner ──────────────────────────────────────── */
        .spinner {
            display: none;
            align-items: center;
            gap: .75rem;
            margin-top: 1.5rem;
            color: #94a3b8;
            font-size: .9rem;
        }

        .spinner.visible {
            display: flex;
        }

        .spinner .dot-loader {
            display: flex;
            gap: 4px;
        }

        .spinner .dot-loader span {
            width: 8px;
            height: 8px;
            background: #818cf8;
            border-radius: 50%;
            animation: bounce .6s infinite alternate;
        }

        .spinner .dot-loader span:nth-child(2) {
            animation-delay: .15s;
        }

        .spinner .dot-loader span:nth-child(3) {
            animation-delay: .3s;
        }

        @keyframes bounce {
            to {
                transform: translateY(-8px);
                opacity: .4;
            }
        }

        /* ── Status Banner ────────────────────────────────── */
        .status-banner {
            margin-top: 1.25rem;
            padding: .75rem 1rem;
            border-radius: .625rem;
            font-size: .85rem;
            font-weight: 500;
            display: none;
        }

        .status-banner.error {
            display: block;
            background: rgba(239, 68, 68, .12);
            border: 1px solid rgba(239, 68, 68, .3);
            color: #fca5a5;
        }

        .status-banner.success {
            display: block;
            background: rgba(34, 197, 94, .1);
            border: 1px solid rgba(34, 197, 94, .25);
            color: #86efac;
        }

        /* ── Results Section ──────────────────────────────── */
        #results-section {
            display: none;
            margin-top: 2rem;
        }

        #results-section.visible {
            display: block;
            animation: fadeUp .5s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .results-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: .75rem;
        }

        .results-header h2 {
            font-size: 1.25rem;
            font-weight: 700;
        }

        .results-count {
            font-size: .85rem;
            color: #94a3b8;
            background: rgba(148, 163, 184, .1);
            padding: .25rem .75rem;
            border-radius: 999px;
        }

        /* Table */
        .table-wrap {
            overflow-x: auto;
            border-radius: .75rem;
            border: 1px solid rgba(148, 163, 184, .12);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: .85rem;
        }

        thead th {
            position: sticky;
            top: 0;
            padding: .7rem .85rem;
            text-align: left;
            background: rgba(30, 41, 59, .95);
            color: #818cf8;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .04em;
            font-size: .75rem;
            border-bottom: 1px solid rgba(148, 163, 184, .1);
        }

        tbody td {
            padding: .65rem .85rem;
            border-bottom: 1px solid rgba(148, 163, 184, .06);
            color: #cbd5e1;
            max-width: 220px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        tbody tr {
            transition: background .2s;
        }

        tbody tr:hover {
            background: rgba(99, 102, 241, .06);
        }

        tbody td a {
            color: #38bdf8;
            text-decoration: none;
        }

        tbody td a:hover {
            text-decoration: underline;
        }

        /* ── Footer ───────────────────────────────────────── */
        .footer {
            text-align: center;
            margin-top: 3rem;
            font-size: .8rem;
            color: #475569;
        }
    </style>
</head>

<body>
    <div class="bg-gradient"></div>
    <div class="wrapper">
        <!-- Hero -->
        <section class="hero">
            <span class="hero-badge">Open-Source Tool</span>
            <h1>Google Maps Scraper</h1>
            <p>Paste a Google Maps URL, extract business data instantly, and download as CSV, JSON, or Excel.</p>
        </section>

        <!-- Input Card -->
        <div class="card" id="input-card">
            <div class="input-group">
                <label for="url-input">Google Maps URL</label>
                <input type="text" id="url-input" placeholder="https://www.google.com/maps/search/restaurants+in+delhi"
                    autofocus>
            </div>

            <div class="row">
                <div class="input-group">
                    <label for="format-select">Export Format</label>
                    <select id="format-select">
                        <option value="csv">CSV</option>
                        <option value="json">JSON</option>
                        <option value="xlsx">Excel (.xlsx)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="max-input">Max Results</label>
                    <input type="number" id="max-input" value="20" min="1" max="200">
                </div>
                <div class="input-group" style="display:flex;flex-direction:column;justify-content:flex-end;">
                    <div class="toggle-row">
                        <label class="switch">
                            <input type="checkbox" id="email-toggle">
                            <span class="slider"></span>
                        </label>
                        <label for="email-toggle" style="text-transform:none;font-size:.85rem;color:#cbd5e1;">Extract
                            Emails</label>
                    </div>
                </div>
            </div>

            <button class="btn btn-primary" id="scrape-btn" onclick="startScrape()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8" />
                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                </svg>
                Start Scraping
            </button>

            <div class="spinner" id="spinner">
                <div class="dot-loader"><span></span><span></span><span></span></div>
                <span id="spinner-text">Launching browser and scraping data...</span>
            </div>
            <div class="status-banner" id="status-banner"></div>
        </div>

        <!-- Results -->
        <section id="results-section">
            <div class="results-header">
                <div style="display:flex;align-items:center;gap:.75rem;">
                    <h2>Results</h2>
                    <span class="results-count" id="results-count"></span>
                </div>
                <div class="btn-group">
                    <button class="btn btn-secondary" onclick="downloadResults('csv')">Download CSV</button>
                    <button class="btn btn-secondary" onclick="downloadResults('json')">Download JSON</button>
                    <button class="btn btn-secondary" onclick="downloadResults('xlsx')">Download Excel</button>
                </div>
            </div>
            <div class="card table-wrap" style="padding:0;">
                <table>
                    <thead id="table-head"></thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </section>

    </div>

    <script>
        // =====================================================
        // IMPORTANT: Set this to your Render backend URL after
        // deploying the backend. Example:
        //   const API_BASE = "https://gmaps-scraper-backend.onrender.com";
        //
        // While developing locally, use:
        //   const API_BASE = "http://localhost:5000";
        // =====================================================
        const API_BASE = "https://scraping-82hq.onrender.com";

        let lastResults = [];

        function showBanner(msg, type) {
            const b = document.getElementById('status-banner');
            b.textContent = msg;
            b.className = 'status-banner ' + type;
        }
        function hideBanner() {
            document.getElementById('status-banner').className = 'status-banner';
        }

        async function startScrape() {
            const url = document.getElementById('url-input').value.trim();
            if (!url) { showBanner('Please enter a Google Maps URL.', 'error'); return; }

            hideBanner();
            const btn = document.getElementById('scrape-btn');
            const spinner = document.getElementById('spinner');
            btn.disabled = true;
            spinner.classList.add('visible');
            document.getElementById('results-section').classList.remove('visible');

            try {
                const res = await fetch(API_BASE + '/scrape', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        url,
                        max: parseInt(document.getElementById('max-input').value) || 20,
                        emails: document.getElementById('email-toggle').checked,
                    })
                });
                const data = await res.json();
                if (!res.ok) { showBanner(data.error || 'Request failed.', 'error'); btn.disabled = false; spinner.classList.remove('visible'); return; }

                const jobId = data.job_id;
                pollJob(jobId, btn, spinner);
            } catch (e) {
                showBanner('Network error: ' + e.message, 'error');
                btn.disabled = false; spinner.classList.remove('visible');
            }
        }

        async function pollJob(jobId, btn, spinner) {
            const spinnerText = document.getElementById('spinner-text');
            const maxPollingSeconds = 180;
            const pollIntervalMs = 2500;
            const fetchTimeoutMs = 8000;
            const maxTransientFailures = 5;

            const startedAt = Date.now();
            let transientFailures = 0;
            let stopped = false;

            const stopPollingWithError = (message) => {
                if (stopped) return;
                stopped = true;
                btn.disabled = false;
                spinner.classList.remove('visible');
                showBanner(message, 'error');
            };

            const stopPollingWithSuccess = (results) => {
                if (stopped) return;
                stopped = true;
                btn.disabled = false;
                spinner.classList.remove('visible');
                if (results && results.length > 0) {
                    lastResults = results;
                    renderTable(results);
                    showBanner(`Successfully scraped ${results.length} result(s).`, 'success');
                } else {
                    showBanner('Scraping completed but no results were found.', 'error');
                }
            };

            const pollOnce = async () => {
                if (stopped) return;

                const elapsed = Math.floor((Date.now() - startedAt) / 1000);
                if (elapsed > maxPollingSeconds) {
                    stopPollingWithError('Scraping is taking too long and was stopped. Try fewer results or disable email extraction.');
                    return;
                }

                spinnerText.textContent = `Scraping in progress... (${elapsed}s)`;

                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), fetchTimeoutMs);

                try {
                    const res = await fetch(API_BASE + '/status/' + jobId, { signal: controller.signal });

                    if (!res.ok) {
                        if (res.status === 502 || res.status === 503 || res.status === 504) {
                            transientFailures += 1;
                            if (transientFailures <= maxTransientFailures) {
                                spinnerText.textContent = `Backend warming up... retrying (${transientFailures}/${maxTransientFailures})`;
                                setTimeout(pollOnce, pollIntervalMs);
                                return;
                            }
                            stopPollingWithError('Backend is temporarily unavailable (gateway error). Please retry in a few seconds.');
                            return;
                        }
                        stopPollingWithError(`Polling failed with HTTP ${res.status}.`);
                        return;
                    }

                    transientFailures = 0;
                    const data = await res.json();

                    if (data.status === 'done') {
                        stopPollingWithSuccess(data.results || []);
                        return;
                    }
                    if (data.status === 'error') {
                        stopPollingWithError('Error: ' + (data.error || 'Unknown error'));
                        return;
                    }
                } catch (e) {
                    transientFailures += 1;
                    if (transientFailures <= maxTransientFailures) {
                        spinnerText.textContent = `Temporary network issue... retrying (${transientFailures}/${maxTransientFailures})`;
                        setTimeout(pollOnce, pollIntervalMs);
                        return;
                    }
                    stopPollingWithError('Polling error: ' + e.message);
                    return;
                } finally {
                    clearTimeout(timeoutId);
                }

                setTimeout(pollOnce, pollIntervalMs);
            };

            pollOnce();
        }

        function escapeHtml(value) {
            return String(value)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function renderTable(results) {
            const section = document.getElementById('results-section');
            const thead = document.getElementById('table-head');
            const tbody = document.getElementById('table-body');
            const count = document.getElementById('results-count');

            const cols = Object.keys(results[0]);
            count.textContent = results.length + ' record' + (results.length === 1 ? '' : 's');

            thead.innerHTML = '<tr>' + cols.map(c => `<th>${escapeHtml(c)}</th>`).join('') + '</tr>';
            tbody.innerHTML = results.map(row =>
                '<tr>' + cols.map(c => {
                    const rawVal = row[c] ?? '—';
                    const safeTitle = escapeHtml((row[c] ?? '').toString());

                    if (typeof rawVal === 'string' && /^https?:\/\//i.test(rawVal)) {
                        const safeUrl = encodeURI(rawVal);
                        const label = rawVal.length > 50 ? rawVal.substring(0, 50) + '...' : rawVal;
                        return `<td title="${safeTitle}"><a href="${safeUrl}" target="_blank" rel="noopener noreferrer">${escapeHtml(label)}</a></td>`;
                    }

                    return `<td title="${safeTitle}">${escapeHtml(rawVal)}</td>`;
                }).join('') + '</tr>'
            ).join('');

            section.classList.add('visible');
        }

        async function downloadResults(fmt) {
            if (!lastResults.length) { showBanner('No results to download.', 'error'); return; }
            try {
                const res = await fetch(API_BASE + '/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ results: lastResults, format: fmt })
                });
                if (!res.ok) { showBanner('Download failed.', 'error'); return; }
                const blob = await res.blob();
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'scraped_data.' + fmt;
                document.body.appendChild(a);
                a.click();
                a.remove();
            } catch (e) {
                showBanner('Download error: ' + e.message, 'error');
            }
        }

        // Allow Enter key to start scraping
        document.getElementById('url-input').addEventListener('keydown', e => { if (e.key === 'Enter') startScrape(); });
    </script>
</body>

</html>
